name: Weekly Scholarship Digest

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip sending + skip committing state"
        type: boolean
        default: true

concurrency:
  group: weekly-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install -r requirements.txt

      - name: Run digest
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER_ADDRESS: ${{ secrets.GMAIL_SENDER_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: python main.py

      - name: Commit updated state
        if: ${{ github.event_name == 'schedule' || inputs.dry_run == false }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add data/sent.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update sent scholarships state"
            git push
          fi
